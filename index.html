<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titans CFW</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Keep transparent so you can see the game */
            font-family: 'Roboto', sans-serif;
            color: white;
            display: flex;
            justify-content: flex-end; /* Aligns menu to the right side */
            padding-right: 50px;
            padding-top: 100px;
            user-select: none;
        }

        .menu-container {
            width: 350px;
            background-color: rgba(15, 15, 15, 0.95);
            border: 1px solid #ff1a1a;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            overflow: hidden;
            display: none; /* Hidden by default, Lua will show it */
        }

        .header {
            background: linear-gradient(90deg, #8b0000, #ff1a1a);
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            border-bottom: 2px solid #330000;
        }

        .item-list {
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
        }

        /* Custom Scrollbar */
        .item-list::-webkit-scrollbar { width: 5px; }
        .item-list::-webkit-scrollbar-track { background: #111; }
        .item-list::-webkit-scrollbar-thumb { background: #ff1a1a; border-radius: 5px; }

        .menu-item {
            background-color: rgba(30, 30, 30, 0.8);
            margin-bottom: 8px;
            padding: 12px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            border-left: 3px solid transparent;
            display: flex;
            justify-content: space-between;
        }

        .menu-item:hover {
            background-color: rgba(50, 10, 10, 0.9);
            border-left: 3px solid #ff1a1a;
            transform: translateX(5px);
        }

        .menu-item .status {
            color: #ff1a1a;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="menu-container" id="menu">
        <div class="header">TITANS CFW</div>
        <div class="item-list">
            <div class="menu-item" onclick="sendAction('ghost_mode')">Ghost Mode <span class="status" id="ghost_status">OFF</span></div>
            <div class="menu-item" onclick="sendAction('spawn_pistol')">Spawn Combat Pistol</div>
            <div class="menu-item" onclick="sendAction('spawn_armor')">Spawn Heavy Armor</div>
            <div class="menu-item" onclick="sendAction('loadout_stash')">Full Weapon Stash</div>
            <div class="menu-item" onclick="sendAction('loadout_vtr')">VTR Discord Loadout</div>
            <div class="menu-item" onclick="sendAction('revive')">Hospital Revive</div>
            <div class="menu-item" onclick="sendAction('hunting_glitch')">Hunting Auto-Sell Glitch</div>
            <div class="menu-item" onclick="sendAction('spawn_adder')">Spawn Adder</div>
            <div class="menu-item" onclick="sendAction('mass_tugs')">Mass Spawn Tugs (Crash)</div>
            <div class="menu-item" onclick="sendAction('chaos')">Ultimate Chaos Spawner</div>
        </div>
    </div>

    <script>
        let isGhost = false;

        // Function to send data back to the Lua Executor
        function sendAction(actionName) {
            if(actionName === 'ghost_mode') {
                isGhost = !isGhost;
                document.getElementById('ghost_status').innerText = isGhost ? "ON" : "OFF";
                document.getElementById('ghost_status').style.color = isGhost ? "#00ff00" : "#ff1a1a";
            }

            // Using standard HTTP fetch to talk back to the Lua NUI callback
            fetch(`https://${GetParentResourceName()}/menuAction`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: actionName })
            });
        }

        // Listen for messages from Lua to show/hide the menu
        window.addEventListener('message', function(event) {
            if (event.data.type === "toggle") {
                const menu = document.getElementById('menu');
                menu.style.display = event.data.state ? "block" : "none";
            }
        });
    </script>
</body>
</html>
